name: Lint HTML

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  htmlhint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run HTMLHint
        run: npx --yes htmlhint index.html
